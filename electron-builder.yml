appId: com.gorseldonusturucu.app
productName: GĂ¶rsel DĂ¶nĂĽĹźtĂĽrĂĽcĂĽ
copyright: Copyright Â© 2026 GĂ¶rsel DĂ¶nĂĽĹźtĂĽrĂĽcĂĽ

# Ana dosya konumu
extraMetadata:
  main: electron/main.js

# Dizinler
directories:
  output: release
  buildResources: assets

# Hangi dosyalar paketlenecek
files:
  - build/**/*
  - electron/**/*
  - node_modules/**/*
  - package.json
  - "!**/*.map"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/.bin"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,__pycache__,thumbs.db,.gitignore,.gitattributes}"

# SÄ±kÄ±ĹźtÄ±rma
compression: normal

# Windows build ayarlarÄ±
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "GorselDonusturucu-Setup-${version}.${ext}"
  publisherName: "GĂ¶rsel DĂ¶nĂĽĹźtĂĽrĂĽcĂĽ"
  verifyUpdateCodeSignature: false
  sign: null  # Kod imzalamayÄ± devre dÄ±ĹźÄ± bÄ±rak

# NSIS (Windows installer) ayarlarÄ±
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: "GĂ¶rsel DĂ¶nĂĽĹźtĂĽrĂĽcĂĽ"
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  differentialPackage: false  # GĂĽncelleme paketi oluĹźturma
