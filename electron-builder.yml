appId: com.gorseldonusturucu.app
productName: G철rsel D철n체힊t체r체c체
copyright: Copyright 짤 2026 G철rsel D철n체힊t체r체c체

# Ana dosya konumu
extraMetadata:
  main: electron/main.js

# Dizinler
directories:
  output: release
  buildResources: assets

# ASAR d캇힊캇na 챌캇kar캇lacak dosyalar (logo i챌in)
extraResources:
  - from: "public/logo-192.png"
    to: "logo-192.png"

# Hangi dosyalar paketlenecek
files:
  - build/**/*
  - electron/**/*
  - node_modules/**/*
  - package.json
  - "!**/*.map"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/.bin"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,__pycache__,thumbs.db,.gitignore,.gitattributes}"

# S캇k캇힊t캇rma
compression: normal

# Windows build ayarlar캇
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "GorselDonusturucu-Setup-${version}.${ext}"
  publisherName: "G철rsel D철n체힊t체r체c체"
  verifyUpdateCodeSignature: false
  sign: null  # Kod imzalamay캇 devre d캇힊캇 b캇rak

# NSIS (Windows installer) ayarlar캇
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: "G철rsel D철n체힊t체r체c체"
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  differentialPackage: false  # G체ncelleme paketi olu힊turma
