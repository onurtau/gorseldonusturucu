<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- TASARIM 3: TEKNOLOJİ - Minimal Hexagon (Mavi-Cyan) -->
  
  <defs>
    <linearGradient id="blueCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Dış Hexagon - Tech Frame -->
  <g transform="translate(256, 256)">
    <polygon points="0,-140 121,-70 121,70 0,140 -121,70 -121,-70" 
             fill="none" stroke="url(#blueCyan)" stroke-width="12"/>
    
    <!-- İç Hexagon -->
    <polygon points="0,-100 87,-50 87,50 0,100 -87,50 -87,-50" 
             fill="none" stroke="#06B6D4" stroke-width="8" opacity="0.6"/>
    
    <!-- Merkez Hexagon - Solid -->
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" 
             fill="url(#blueCyan)"/>
    
    <!-- İç Transform İkonu -->
    <g>
      <!-- Sol Ok -->
      <path d="M -30 -10 L -15 0 L -30 10" 
            stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Sağ Ok -->
      <path d="M 15 -10 L 30 0 L 15 10" 
            stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  
  <!-- Alt Şerit -->
  <rect x="180" y="420" width="152" height="8" rx="4" fill="url(#blueCyan)" opacity="0.6"/>
</svg>
