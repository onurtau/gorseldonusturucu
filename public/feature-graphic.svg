<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
    
    <!-- Accent Gradients -->
    <linearGradient id="accentGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:0.1" />
    </linearGradient>
    
    <linearGradient id="accentGradient2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.1" />
    </linearGradient>
    
    <!-- Logo Gradients -->
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bgGradient)"/>
  
  <!-- Decorative Circles (Left) -->
  <circle cx="100" cy="100" r="150" fill="url(#accentGradient1)" opacity="0.6"/>
  <circle cx="150" cy="400" r="100" fill="url(#accentGradient2)" opacity="0.4"/>
  
  <!-- Decorative Circles (Right) -->
  <circle cx="924" cy="150" r="120" fill="url(#accentGradient1)" opacity="0.5"/>
  <circle cx="874" cy="380" r="80" fill="url(#accentGradient2)" opacity="0.5"/>
  
  <!-- Logo Container (Centered) -->
  <g transform="translate(312, 50)">
    <!-- Left Frame (Input Image) -->
    <g transform="translate(50, 50)">
      <rect x="0" y="0" width="140" height="160" rx="16" fill="none" stroke="url(#gradient1)" stroke-width="4"/>
      <!-- Mountain Icon -->
      <path d="M 20 120 L 50 80 L 80 100 L 110 60 L 120 120 Z" fill="url(#gradient2)" opacity="0.6"/>
      <circle cx="35" cy="50" r="12" fill="#60A5FA" opacity="0.8"/>
    </g>
    
    <!-- Arrow with Transform Effect -->
    <g transform="translate(256, 175)">
      <!-- Arrow Body -->
      <rect x="-30" y="-6" width="60" height="12" rx="6" fill="url(#gradient1)"/>
      <!-- Arrow Head -->
      <path d="M 30 0 L 50 0 L 30 -15 M 50 0 L 30 15" stroke="url(#gradient1)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <!-- Sparkle Effects -->
      <circle cx="0" cy="-25" r="4" fill="#60A5FA"/>
      <circle cx="-15" cy="20" r="3" fill="#93C5FD"/>
      <circle cx="15" cy="18" r="3" fill="#93C5FD"/>
      <circle cx="0" cy="0" r="5" fill="#3B82F6" opacity="0.6">
        <animate attributeName="r" values="5;8;5" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Right Frame (Enhanced Output) -->
    <g transform="translate(350, 50)">
      <rect x="0" y="0" width="140" height="160" rx="16" fill="none" stroke="url(#gradient2)" stroke-width="4"/>
      <!-- Enhanced Mountain Icon -->
      <path d="M 20 120 L 50 80 L 80 100 L 110 60 L 120 120 Z" fill="url(#gradient1)"/>
      <circle cx="35" cy="50" r="12" fill="#60A5FA"/>
      <!-- Quality Badge -->
      <circle cx="110" cy="35" r="18" fill="#10B981"/>
      <path d="M 103 35 L 108 40 L 117 30" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>
  
  <!-- Subtle Grid Pattern -->
  <g opacity="0.03">
    <rect x="0" y="0" width="1024" height="500" fill="none" stroke="#60A5FA" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="500" stroke="#60A5FA" stroke-width="1"/>
    <line x1="512" y1="0" x2="512" y2="500" stroke="#60A5FA" stroke-width="1"/>
    <line x1="768" y1="0" x2="768" y2="500" stroke="#60A5FA" stroke-width="1"/>
    <line x1="0" y1="125" x2="1024" y2="125" stroke="#60A5FA" stroke-width="1"/>
    <line x1="0" y1="250" x2="1024" y2="250" stroke="#60A5FA" stroke-width="1"/>
    <line x1="0" y1="375" x2="1024" y2="375" stroke="#60A5FA" stroke-width="1"/>
  </g>
</svg>
