<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- TASARIM 1: PRESTIJ - Minimal Crown Symbol (Lacivert-Altın) -->
  
  <defs>
    <linearGradient id="navyGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Ana Rozet Şekli -->
  <circle cx="256" cy="256" r="130" fill="url(#navyGold)"/>
  
  <!-- Altın Taç (Crown) - Transform Sembolü -->
  <g transform="translate(256, 256)">
    <!-- Taç Tabanı -->
    <rect x="-70" y="35" width="140" height="20" rx="3" fill="url(#goldShine)"/>
    
    <!-- 3 Tepe -->
    <polygon points="0,-60 15,-20 -15,-20" fill="url(#goldShine)"/>
    <polygon points="-45,-40 -30,0 -60,0" fill="url(#goldShine)" opacity="0.9"/>
    <polygon points="45,-40 60,0 30,0" fill="url(#goldShine)" opacity="0.9"/>
    
    <!-- Mücevher Detayları -->
    <circle cx="0" cy="-35" r="6" fill="#FEF3C7"/>
    <circle cx="-45" cy="-20" r="5" fill="#FEF3C7" opacity="0.8"/>
    <circle cx="45" cy="-20" r="5" fill="#FEF3C7" opacity="0.8"/>
  </g>
  
  <!-- Alt Şerit -->
  <rect x="180" y="420" width="152" height="8" rx="4" fill="url(#goldShine)" opacity="0.6"/>
</svg>
